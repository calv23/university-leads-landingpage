version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${STAGING_SUPABASE_URL}
      - SUPABASE_KEY=${STAGING_SUPABASE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_URL=${STAGING_APP_URL}
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
